# The Actionability Test — for an instruction-bearing artefact (plan, spec,
# brief), can the reader act on it without coming back with structural
# questions? Delivery dimension.
test: the-actionability-test
name: The Actionability Test
question: Can the reader act on this without coming back with structural questions?
description: >
  Scores whether instruction-bearing artefacts are *usable*. Applies most
  forcefully to delivery plans, architecture specs, briefs, ADRs, and SoWs.
  An actionable artefact tells the reader who does what, when, with what
  inputs, against what success criteria. An unactionable one tells them what
  exists but not what to do with it.
dimension: delivery-quality
applies_to: both

scale:
  min: 1
  max: 5
  labels:
    1: The reader has to ask before they can start — owner, sequence, inputs,
       or success criteria missing.
    2: Mostly clear but at least one structural ambiguity that blocks action.
    3: Actionable with judgment calls the reader can make themselves.
    4: Action-ready for the intended reader; no follow-up needed.
    5: Self-contained — the reader can pick it up cold and execute.

criteria:
  - Owners named per action / phase / deliverable
  - Sequence + dependencies explicit (not implicit in prose)
  - Inputs the reader needs are pointed at (path / slug / system)
  - Success criteria stated, not assumed
  - Edge cases and rollback / contingency named
  - For specs — schemas, contracts, interfaces are named, not described

# Conditional in spirit (applies to instruction-bearing artefacts); weight
# 1.0 is a sensible default. The score should map to "n/a" via 5 for
# decorative artefacts where the test doesn't really apply.
weight: 1.0
threshold:
  pass: 4
  warn: 3
