# Pre-commit hooks for the studios marketplace repo.
# Run `pre-commit install` once; thereafter hooks run on `git commit`.
# Run on the whole tree any time with `pre-commit run --all-files`.
#
# Division of labor (kept non-overlapping on purpose):
#   prettier  -> JSON formatting (plugin manifests, schemas)
#   yamllint  -> YAML linting (format contracts) — does NOT reformat
#   shellcheck/shfmt -> shell scripts
#   ruff      -> Python lint + format (studio/message CLI packages)
#   gitleaks  -> secret scanning (this repo is published as a marketplace)

# Never touch per-machine venvs, local caches, or editor scratch.
exclude: |
  (?x)^(
    .*/\.venv/.*|
    \.dual-graph/.*|
    .*/__pycache__/.*|
    .*\.DS_Store
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-json
      - id: check-yaml
        # Studio format files are plain YAML; allow multi-doc just in case.
        args: [--allow-multiple-documents]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -sr, -w]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        # JSON only — YAML is handled by yamllint, Markdown left to authors.
        types_or: [json]
