# Export: pdf — paginated print/screen document.
export: pdf
name: PDF
asset_type: document
render:
  # engine comes from the layout (linear/frame); pdf is layout-agnostic.
  studio_format: pdf      # studio render maps pdf -> Typst engine
requires:
  render: [quarto]      # Quarto bundles typst; no separate typst install needed
style_guide:
  layout: paginated A4/Letter portrait with fixed page geometry
  notes: mind page breaks; keep sections/panels together; design for print and screen
  page_discipline: avoid orphaned headings and split panels; group asset + caption
ruleset:
  max_pages: 15
  page_size: [A4, Letter]
