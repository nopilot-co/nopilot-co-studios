# Export: pptx — speaker-led slide deck.
export: pptx
name: PPTX
asset_type: deck
render:
  engine: pptx-engine    # PPTX is rendered natively by python-pptx, NOT by Quarto.
  studio_format: pptx    # This overrides the layout's engine (linear/carousel) because
                         # the asset is a native deck regardless of how it's narrated.
requires:
  render: [quarto]
  qa: [libreoffice]     # PPTX -> PDF for QA screenshots
style_guide:
  layout: 16:9 slides; one idea per slide
  notes: blocks render as native editable shapes/text (slice 4); parity with gslide/html/pdf
ruleset:
  max_slides: 20
  aspect_ratio: "16:9"
