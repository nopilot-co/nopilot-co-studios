# Export: html — single responsive web page.
export: html
name: HTML
asset_type: webpage
render:
  # engine comes from the layout (linear -> Quarto, frame -> showcase template).
  studio_format: html
requires:
  render: [quarto]
  qa: [html-raster]   # headless-browser rasterization for eyes-on-pixels QA
style_guide:
  layout: single responsive scroll; no pagination
  notes: progressive disclosure; links and anchors are first-class
  print: clean print-from-HTML expected for documents (proposal/whitepaper/sow)
ruleset:
  responsive: true
  max_scroll_screens: 12   # advisory — QA enforces, not deterministic
