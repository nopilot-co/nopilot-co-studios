asset: highlight-panel
name: Highlight panel
description: A lightly shaded container that draws attention to key content.
buckets: [documents, decks]
exports: [html, pdf, pptx, gslide]
style:
  bg: "{colors.surface}"
  rounded: "{rounded.lg}"
  pad: "{spacing.lg}"
authoring:
  syntax: |
    ::: highlight
    Key content deserving emphasis goes here.
    :::
  notes: Quarto fenced div with class `highlight`.
render_notes:
  html: "<div class='highlight'> surface background, large border-radius, generous padding"
  pdf: "Typst block: surface fill, rounded corners, lg padding on all sides"
  pptx: "rounded rectangle shape, surface fill, generous internal margin"
  gslide: "rounded text box, surface background, lg padding"
