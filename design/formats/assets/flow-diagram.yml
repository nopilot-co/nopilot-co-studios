asset: flow-diagram
name: Flow diagram
description: A directed flowchart showing a process, decision tree, or system flow.
buckets: [decks]
exports: [pptx, gslide, html, pdf]
style:
  node: "{colors.surface}"
  arrow: "{colors.secondary}"
authoring:
  syntax: |
    ::: flow
    ```{mermaid}
    flowchart LR
      A[Start] --> B{Decision}
      B -->|Yes| C[Action]
      B -->|No| D[End]
    ```
    :::
  notes: Quarto fenced div with class `flow`.
render_notes:
  html: "<div class='flow'> Mermaid SVG rendered inline, surface nodes, secondary arrows"
  pdf: "Typst: Mermaid diagram rendered as SVG then embedded, styled with surface/secondary"
  pptx: "SmartArt or shape group: surface-fill nodes, secondary arrows"
  gslide: "diagram shapes: surface nodes, secondary connectors"
