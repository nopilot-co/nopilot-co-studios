asset: data-viz
name: Data visualisation
description: A chart or graph rendering quantitative data visually for analysis.
buckets: [documents, decks]
exports: [pptx, gslide, html, pdf]
style:
  series: "{colors.tertiary}"
  grid: "{colors.secondary}"
authoring:
  syntax: |
    ::: chart
    type: bar          # bar | line | pie | scatter | area
    title: Revenue
    x: [Q1, Q2, Q3, Q4]
    y: [12, 18, 15, 24]
    :::
  notes: Structured YAML fenced div; rendered to SVG by studio.charts (matplotlib).
render_notes:
  html: "Inline matplotlib SVG"
  pdf: "Same SVG placed via Typst #image()"
