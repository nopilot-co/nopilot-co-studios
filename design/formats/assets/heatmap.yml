asset: heatmap
name: Heatmap / RAG grid
description: 'A grid of cells coloured by magnitude (heatmap) or by red/amber/green status (RAG, with `rag: true`).'
buckets: [documents, decks]
exports: [html, pdf]
exports_data: csv
style:
  scale: "{colors.tertiary}"
authoring:
  syntax: |
    ::: heatmap
    rag: true            # optional — cells are red/amber/green status instead of magnitude
    rows: [Team A, Team B]
    cols: [Q1, Q2]
    cells:
      - [green, red]
      - [amber, green]
    :::
  notes: 'Either a rows×cols `cells` matrix (row-major), or a `data:` list of {row, col, value, rag}. `rag: true` maps cells to status colours.'
render_notes:
  status: live             # renders via studio.frameworks (matplotlib SVG); CSV also ships
  html: "Inline matplotlib SVG (studio.frameworks): coloured cell grid (RAG status or magnitude tint)"
  pdf: "Same SVG placed via Typst #image()"
data_csv:
  files: ["<viz-id>.csv"]
  columns: [viz_id, type, row, col, value, rag]
