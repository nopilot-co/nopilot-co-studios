asset: matrix
name: 2x2 matrix (quadrant)
description: Items placed on two axes into four quadrants (e.g. effort × impact, reach × value).
buckets: [documents, decks]
exports: [html, pdf, pptx]
exports_data: csv
style:
  axis: "{colors.secondary}"
  item: "{colors.tertiary}"
authoring:
  syntax: |
    ::: matrix
    axes: {x: Effort, y: Impact}
    items:
      - {label: Quick win, x: low, y: high, quadrant: Do now}
      - {label: Big bet, x: high, y: high, quadrant: Plan}
    :::
  notes: Each item has x/y positions (low/high or numeric) and an optional quadrant label. A `quadrants:[{quadrant, items}]` form also works.
render_notes:
  status: pending          # NOT-YET-BUILT — renderer is Phase 2; CSV ships today regardless
  html: "pending — visible fallback panel until the matrix engine lands"
  pdf: "pending"
data_csv:
  files: ["<viz-id>.csv"]
  columns: [viz_id, type, item, x_axis, y_axis, quadrant, value]
