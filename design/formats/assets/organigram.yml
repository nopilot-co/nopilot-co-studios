asset: organigram
name: Organigram
description: An organisational chart mapping roles, teams, and reporting lines.
buckets: [decks]
exports: [pptx, gslide, html, pdf]
style:
  node: "{colors.surface}"
  line: "{colors.secondary}"
authoring:
  syntax: |
    ::: org
    ```{mermaid}
    graph TD
      CEO --> CTO
      CEO --> CFO
      CTO --> Eng[Engineering]
    ```
    :::
  notes: Quarto fenced div with class `org`.
render_notes:
  html: "<div class='org'> Mermaid org chart SVG, surface-fill nodes, secondary lines"
  pdf: "Typst: org chart SVG embedded, surface nodes, secondary reporting lines"
  pptx: "SmartArt org chart: surface-fill role boxes, secondary connector lines"
  gslide: "org chart shapes: surface node fill, secondary lines"
