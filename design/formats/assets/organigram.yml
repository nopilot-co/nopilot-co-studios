asset: organigram
name: Organigram
description: An organisational chart mapping roles, teams, and reporting lines.
buckets: [decks]
exports: [pptx, gslide, html, pdf]
style:
  node: "{colors.surface}"
  line: "{colors.secondary}"
authoring:
  syntax: |
    ::: org
    root: CEO
    children:
      - root: CTO
        children: [Eng, Data]
      - COO
    :::
  notes: Structured nested YAML fenced div; expanded per export by studio.diagrams.
render_notes:
  html: "Mermaid flowchart TD (inline SVG)"
  pdf: "Typst fletcher tree with computed coordinates"
