asset: callout-panel
name: Callout
description: An accented aside that flags warnings, tips, or important notes inline.
buckets: [documents]
exports: [html, pdf]
style:
  bg: "{colors.surface}"
  accent: "{colors.tertiary}"
authoring:
  syntax: |
    ::: callout
    **Note:** Something the reader must not miss.
    :::
  notes: Quarto fenced div with class `callout`.
render_notes:
  html: "<aside class='callout'> surface background, tertiary left-border accent"
  pdf: "Typst block: surface fill, tertiary left rule, body text"
