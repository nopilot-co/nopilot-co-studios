asset: callout-panel
name: Callout
description: An accented aside that flags warnings, tips, or important notes inline.
buckets: [documents, decks]
exports: [html, pdf, pptx, gslide]
style:
  bg: "{colors.surface}"
  accent: "{colors.tertiary}"
authoring:
  syntax: |
    ::: ds-callout
    **Note:** Something the reader must not miss.
    :::
  notes: Quarto fenced div with class `ds-callout` (avoids Quarto's reserved `callout`).
render_notes:
  html: "<aside class='ds-callout'> surface background, tertiary left-border accent"
  pdf: "Typst block: surface fill, tertiary left rule, body text"
  pptx: "accented text box / shape, used sparingly on a slide"
