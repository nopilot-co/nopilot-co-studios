asset: hierarchy-diagram
name: Hierarchy
description: A tree diagram showing parent-child relationships between concepts or entities.
buckets: [decks]
exports: [pptx, gslide, html, pdf]
style:
  node: "{colors.surface}"
  line: "{colors.secondary}"
authoring:
  syntax: |
    ::: hierarchy
    root: Strategy
    children:
      - root: Pillar A
        children: [Initiative 1, Initiative 2]
      - Pillar B
    :::
  notes: Structured nested YAML fenced div; expanded per export by studio.diagrams.
render_notes:
  html: "Mermaid flowchart TD (inline SVG)"
  pdf: "Typst fletcher tree with computed coordinates"
