asset: timeline
name: Timeline
description: A chronological axis with dated milestones or events shown in sequence.
buckets: [decks]
exports: [pptx, gslide, html, pdf]
style:
  axis: "{colors.secondary}"
  marker: "{colors.tertiary}"
authoring:
  syntax: |
    ::: timeline
    events:
      - {at: Q1, label: Kickoff}
      - {at: Q2, label: Beta}
      - {at: Q3, label: GA}
    :::
  notes: Structured YAML fenced div; expanded per export by studio.diagrams.
render_notes:
  html: "Mermaid timeline (inline SVG)"
  pdf: "Typst fletcher axis with period markers + labels"
